# Stratégie Dependabot — kdo-list-dev
#
# Objectif : garder les dépendances à jour avec le moins de bruit possible, et
# une vraie défense supply-chain (cooldown + quarantaine min-release-age), sans
# casser la CI. Repo privé en plan gratuit -> ni auto-merge ni ruleset GitHub
# (features Pro/Team) : tous les merges sont manuels, mais le groupage isole le
# lot sûr (patches) pour qu'il se relise/merge en un coup.
#
# Trois écosystèmes surveillés : npm (frontend), pip (backend), github-actions.
#
# Matrice de décision :
#   patch (npm/pip)    -> 👀 PR groupée (lot sûr, merge rapide après CI verte)
#   minor (npm/pip)    -> 👀 PR groupée, merge manuel
#   major (npm/pip)    -> 👀 PR individuelle, merge manuel (relire les breaking changes)
#   github-actions     -> 👀 PR groupée tous types, merge manuel
#   @types/node major  -> 🚫 ignoré (runtime CI = Node 24, on ne chasse pas les majors)
#   faille de sécurité -> 🤖 PR Dependabot security update (toujours, hors cycle)
version: 2
updates:
  # ── Frontend : Next.js / npm (lit package-lock.json) ──────────────────────
  - package-ecosystem: "npm"
    directory: "/kdoapp"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "frontend"
      - "dependencies"
    # Délai avant de PROPOSER une version fraîchement publiée (3 j). Ne couvre que
    # les deps directes bumpées par Dependabot. La quarantaine à la résolution
    # (transitives comprises) est assurée par kdoapp/.npmrc -> min-release-age=3,
    # alignée sur ce délai. Les deux couches sont complémentaires.
    cooldown:
      default-days: 3
    groups:
      # Patches isolés dans leur propre groupe -> lot à faible risque, relu et
      # mergé en un coup, séparé des minors qui méritent plus d'attention.
      npm-patches:
        applies-to: version-updates
        update-types:
          - "patch"
      # Minors groupés -> 1 PR, merge manuel.
      npm-minors:
        applies-to: version-updates
        update-types:
          - "minor"
    # Majors hors groupe -> 1 PR par paquet, merge manuel.
    ignore:
      # Le runtime tourne sur Node 24 (CI node-version: 24). On ne saute pas les
      # majors de @types/node pour ne pas typer contre des API non exécutées.
      - dependency-name: "@types/node"
        update-types:
          - "version-update:semver-major"

  # ── Backend : FastAPI / pip (lit requirements.txt) ────────────────────────
  - package-ecosystem: "pip"
    directory: "/server"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "backend"
      - "dependencies"
    cooldown:
      default-days: 3
    groups:
      pip-patches:
        applies-to: version-updates
        update-types:
          - "patch"
      pip-minors:
        applies-to: version-updates
        update-types:
          - "minor"
    # Majors hors groupe -> 1 PR par paquet, merge manuel.

  # ── CI : versions des GitHub Actions ──────────────────────────────────────
  # Faible fréquence, on veut un œil sur les majors -> tous types groupés, manuel.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "09:00"
    open-pull-requests-limit: 5
    labels:
      - "ci"
      - "dependencies"
    groups:
      github-actions:
        applies-to: version-updates
        patterns:
          - "*"
