version: "3.3"
services:
  fastapi:
    build:
      context: ./server
    container_name: kdo-api
    ports:
      - "8000:8000"
    volumes:
      - ./server:/app
      - ./kdoapp/public/kdos:/shared/kdos

  nextjs:
    build:
      context: ./kdoapp
    container_name: kdo-frontend
    ports:
      - "3001:3000"
    volumes:
      - ./kdoapp/public/kdos:/app/public/kdos
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_ADDRESS=http://kdp-api:8000
