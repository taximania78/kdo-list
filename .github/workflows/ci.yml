name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

# Least privilege: the default token is read-only; jobs only check out and test.
permissions:
  contents: read

jobs:
  backend-tests:
    name: Backend Tests (FastAPI)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./server
        
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
    
    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
      with:
        python-version: '3.13'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        # If requirements doesn't contain test deps, install them explicitly:
        pip install pytest pytest-asyncio httpx
        
    - name: Run Pytest
      run: pytest -v

  frontend-tests:
    name: Frontend Tests (Next.js)
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./kdoapp
        
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
    
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
      with:
        node-version: '24' # Or your specific node version
        cache: 'npm'
        cache-dependency-path: './kdoapp/package-lock.json'

    # min-release-age (.npmrc) requiert npm >= 11.10 ; sinon la clé est ignorée
    # silencieusement. On force une version qui la supporte avant toute résolution.
    - name: Ensure npm supports min-release-age
      run: npm install -g npm@^11.10.0

    - name: Install dependencies
      run: npm ci
      
    - name: Run Linter
      run: npm run lint
      
    - name: Run Jest Component Tests
      run: npm run test
      
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
      
    - name: Run Playwright E2E Tests
      run: npm run test:e2e
      
    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: playwright-report
        path: ./kdoapp/playwright-report/
        retention-days: 30
