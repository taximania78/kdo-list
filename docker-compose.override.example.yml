# Déploiement-spécifique (reverse-proxy, réseau, watchtower...).
#
# Docker Compose fusionne automatiquement docker-compose.yml + docker-compose.override.yml
# au `docker compose up`. Copie ce fichier en `docker-compose.override.yml`
# (gitignored, donc jamais écrasé par git pull/reset) et adapte-le à ton infra.
#
#   cp docker-compose.override.example.yml docker-compose.override.yml
#
# Exemple ci-dessous : exposition derrière Traefik + CrowdSec sur un réseau `proxy` externe.
services:
  fastapi:
    networks: [proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kdo-api.rule=Host(`${APP_DOMAIN}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.kdo-api.priority=100"
      - "traefik.http.routers.kdo-api.entrypoints=websecure"
      - "traefik.http.routers.kdo-api.tls.certresolver=tls"
      - "traefik.http.routers.kdo-api.middlewares=crowdsec@file"
      - "traefik.http.services.kdo-api.loadbalancer.server.port=8000"

  nextjs:
    networks: [proxy]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.kdo-front.rule=Host(`${APP_DOMAIN}`)"
      - "traefik.http.routers.kdo-front.entrypoints=websecure"
      - "traefik.http.routers.kdo-front.tls.certresolver=tls"
      - "traefik.http.services.kdo-front.loadbalancer.server.port=3000"
      - "traefik.http.middlewares.kdo-headers.headers.customResponseHeaders.X-Robots-Tag=noindex, nofollow, nosnippet, noarchive"
      - "traefik.http.routers.kdo-front.middlewares=crowdsec@file,kdo-headers"

  db:
    networks: [proxy]
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

networks:
  proxy:
    external: true
